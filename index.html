<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>AI 유튜브 자막 생성기</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 800px;
            width: 100%;
            margin-bottom: 20px;
        }
        h1 {
            margin-top: 0;
            color: #333;
            text-align: center;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #0056b3; }
        button:disabled {
            background-color: #aaa;
            cursor: not-allowed;
        }
        #pipBtn:hover { background-color: #218838; }
        #status {
            margin-top: 15px;
            font-weight: bold;
            text-align: center;
            color: #007bff;
        }

        .video-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 16 / 9;
            background-color: black;
            border-radius: 10px;
            overflow: hidden;
            display: none;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 자막 디자인 */
        .subtitle-overlay {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background-color: rgba(0, 0, 0, 0.7);
            font-size: 24px;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 10px;
            text-align: center;
            width: 80%;
            pointer-events: none;
            display: none;
        }
    </style>
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>
    <div class="container">
        <h1>🎙️ AI 유튜브 자막 생성기</h1>
        <div class="input-group">
            <label>Gemini API Key</label>
            <input type="password" id="apiKey" placeholder="AI Studio에서 발급받은 API 키를 입력하세요">
        </div>
        <div class="input-group">
            <label>유튜브 영상 URL</label>
            <input type="text" id="videoUrl" placeholder="https://www.youtube.com/watch?v=...">
        </div>
        <div class="input-group">
            <label>번역 테마 (선택사항)</label>
            <input type="text" id="theme" placeholder="예 : 2D 플랫포머 게임 개발, 리뷰 등">
        </div>
        <button id="generateBtn" onclick="generateSubtitles()">자막 생성 및 영상 재생</button>
        
        <button id="pipBtn" onclick="togglePiP()" style="display: none; background-color: #28a745; margin-top: 10px;">📺 PIP 모드로 보기 (화면 속 화면)</button>
        
        <div id="status"></div>
    </div>

    <div class="video-container" id="videoWrapper">
        <div id="player"></div>
        <div class="subtitle-overlay" id="subtitleText">AI 자막 실행 중...</div>
    </div>

    <script>
        let player;
        let subtitles = [];
        let subtitleInterval;
        let pipWindow = null;

        function extractVideoID(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function parseSubtitles(text) {
            const parsed = [];
            const lines = text.split('\n');
            const regex = /\[(\d{1,2}):(\d{1,2})\]\s*(.*)/;

            for (let line of lines) {
                const match = line.match(regex);
                if(match) {
                    const minutes = parseInt(match[1]);
                    const seconds = parseInt(match[2]);
                    const content = match[3].trim();
                    parsed.push({ time: (minutes * 60) + seconds, text: content });
                }
            }
            return parsed;
        }

        async function generateSubtitles() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const videoUrl = document.getElementById('videoUrl').value.trim();
            const theme = document.getElementById("theme").value.trim();
            const statusEl = document.getElementById('status');
            const btn = document.getElementById('generateBtn');

            if(!apiKey || !videoUrl) {
                alert("API Key와 유튜브 URL을 모두 입력해주세요!");
                return;
            }

            const videoId = extractVideoID(videoUrl);
            if(!videoId) {
                alert("유효한 유튜브 URL이 아닙니다");
                return;
            }

            btn.disabled = true;
            statusEl.innerText = "서버에서 오디오를 추출하고 Gemini가 번역 중입니다....";
            document.getElementById('videoWrapper').style.display = 'none';
            document.getElementById('pipBtn').style.display = 'none';

            try {
                const response = await fetch("http://127.0.0.1:8000/api/get_subtitles", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ url: videoUrl, api_key: apiKey, theme: theme })
                });

                if(!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.detail || "서버 에러 발생");
                }

                const data = await response.json();

                subtitles = parseSubtitles(data.subtitle_text);
                if(subtitles.length == 0) {
                    throw new Error("자막을 추출하였지만 정해진 타임 스탬프 형식을 찾지 못했습니다.");
                }

                localStorage.setItem('savedApiKey', apiKey);
                localStorage.setItem('savedVideoUrl', videoUrl);
                localStorage.setItem('savedTheme', theme);
                localStorage.setItem('savedSubtitles', JSON.stringify(subtitles));

                statusEl.innerText = "✅ 자막 생성 완료! 영상이 재생됩니다.";

                document.getElementById('videoWrapper').style.display = 'block';
                document.getElementById('pipBtn').style.display = 'block';
                document.getElementById('subtitleText').style.display = 'block';
                document.getElementById('subtitleText').innerText = '영상 재생 대기 중...';

                if (player) {
                    player.loadVideoById(videoId);
                } else {
                    player = new YT.Player('player', {
                        height: '100%',
                        width: '100%',
                        videoId: videoId,
                        playerVars: {
                            'origin': window.location.origin
                        },
                        events: {
                            'onStateChange': onPlayerStateChange
                        }
                    });
                }
            }
            catch (error) {
                console.error(error);
                statusEl.innerText = "❌ 에러: " + error.message;
            }
            finally {
                btn.disabled = false;
            }
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                subtitleInterval = setInterval(() => {
                    const currentTime = player.getCurrentTime();
                    let currentText = "";

                    for(let i = 0; i < subtitles.length; i++) {
                        if(subtitles[i].time <= currentTime) {
                            currentText = subtitles[i].text;
                        } else {
                            break;
                        }
                    }

                    if(currentText) {
                        document.getElementById('subtitleText').innerText = currentText;
                    }
                }, 100);
            } else {
                clearInterval(subtitleInterval);
            }
        }

        async function togglePiP() {
            if (!('documentPictureInPicture' in window)) {
                alert("현재 브라우저에서는 Document PIP 기능을 지원하지 않습니다.\n(크롬 최신 버전을 사용해주세요)");
                return;
            }

            const videoWrapper = document.getElementById('videoWrapper');

            if (pipWindow) {
                pipWindow.close();
                return;
            }

            try {
                pipWindow = await window.documentPictureInPicture.requestWindow({
                    width: videoWrapper.clientWidth,
                    height: videoWrapper.clientHeight,
                });
                
                const meta = document.createElement('meta');
                meta.name = "referrer";
                meta.content = "strict-origin-when-cross-origin";
                pipWindow.document.head.appendChild(meta);
                
                [...document.styleSheets].forEach((styleSheet) => {
                    try {
                        const cssRules = [...styleSheet.cssRules].map((rule) => rule.cssText).join('');
                        const style = document.createElement('style');
                        style.textContent = cssRules;
                        pipWindow.document.head.appendChild(style);
                    } catch (e) {
                        console.warn("일부 외부 스타일을 가져오지 못했습니다.", e);
                    }
                });

                pipWindow.document.body.appendChild(videoWrapper);

                pipWindow.addEventListener("pagehide", (event) => {
                    document.body.appendChild(videoWrapper);
                    pipWindow = null;
                });

            } catch (error) {
                console.error("PIP 오류:", error);
                alert("PIP 모드를 실행하는 중 오류가 발생했습니다.");
            }
        }
        window.addEventListener('DOMContentLoaded', () => {
            const savedApiKey = localStorage.getItem('savedApiKey');
            const savedVideoUrl = localStorage.getItem('savedVideoUrl');
            const savedTheme = localStorage.getItem('savedTheme');
            const savedSubtitles = localStorage.getItem('savedSubtitles');

            if (savedApiKey) document.getElementById('apiKey').value = savedApiKey;
            if (savedVideoUrl) document.getElementById('videoUrl').value = savedVideoUrl;
            if (savedTheme) document.getElementById('theme').value = savedTheme;

            if (savedVideoUrl && savedSubtitles) {
                subtitles = JSON.parse(savedSubtitles);
                
                document.getElementById('videoWrapper').style.display = 'block';
                document.getElementById('pipBtn').style.display = 'block';
                document.getElementById('subtitleText').style.display = 'block';
                document.getElementById('subtitleText').innerText = '💾 이전 자막 데이터를 불러왔습니다. 재생을 눌러주세요.';
                document.getElementById('status').innerText = "✅ 저장된 자막 세팅 완료!";
            }
        });

        function onYouTubeIframeAPIReady() {
            const savedVideoUrl = localStorage.getItem('savedVideoUrl');
            const savedSubtitles = localStorage.getItem('savedSubtitles');

            if (savedVideoUrl && savedSubtitles) {
                const videoId = extractVideoID(savedVideoUrl);
                player = new YT.Player('player', {
                    height: '100%',
                    width: '100%',
                    videoId: videoId,
                    playerVars: {
                        'origin': window.location.origin
                    },
                    events: {
                        'onStateChange': onPlayerStateChange
                    }
                });
            }
        }
    </script>
</body>
</html>
